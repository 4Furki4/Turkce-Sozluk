services:
  app-production:
    image: ${APP_IMAGE:-furki4/turkish-dictionary-app:latest}
    container_name: turkish-dictionary-app-production
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - com.centurylinklabs.watchtower.enable=true
    env_file:
      - path: .env.production.pi
        required: false
    environment:
      - NODE_ENV=production
      - DATABASE_HOST=pgbouncer-production
      - DATABASE_PORT=5432
      - DATABASE_USERNAME=${POSTGRES_USER:-postgres}
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD}
      - DATABASE_DATABASE=${POSTGRES_DB:-turkish_dictionary}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@pgbouncer-production:5432/${POSTGRES_DB:-turkish_dictionary}?sslmode=disable
      - VALKEY_URL=redis://valkey-production:6379
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      pgbouncer-production:
        condition: service_started
      valkey-production:
        condition: service_healthy

  valkey-production:
    image: valkey/valkey:8.1-alpine
    container_name: turkish-dictionary-valkey-production
    restart: unless-stopped
    init: true
    user: "999:1000"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    command:
      - valkey-server
      - --save
      - ""
      - --appendonly
      - "no"
      - --dir
      - /tmp
      - --maxmemory
      - 128mb
      - --maxmemory-policy
      - volatile-ttl
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  pgbouncer-production:
    image: edoburu/pgbouncer:latest
    container_name: turkish-dictionary-pgbouncer-production
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - DB_USER=${POSTGRES_USER:-postgres}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_HOST=db-production
      - DB_NAME=${POSTGRES_DB:-turkish_dictionary}
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=100
      - DEFAULT_POOL_SIZE=20
    depends_on:
      - db-production

  db-production:
    image: postgres:17-alpine
    container_name: turkish-dictionary-db-production
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-turkish_dictionary}
      - POSTGRES_HOST_AUTH_METHOD=md5
      - POSTGRES_INITDB_ARGS=--auth=md5
    volumes:
      - pgdata-production:/var/lib/postgresql/data

  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower-1
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - DOCKER_API_VERSION=1.40
    command: --label-enable --cleanup --interval 300
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  pgdata-production:
